<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
    <title>Text Box Creator</title>
  </head>
  <body>
    <main>
	<a href="base.html">Back</a><span> </span>
	<a href="text_help.html" onclick="window.open(this.href,'targetWindow', 'width=500, height=500'); return false;">Help</a>
	<span> </span><span>Complex: </span><input type="checkbox" id="complexmode" checked="true">
	<br>
	<br>
	<div class="box" id="box_box" style="display:inline-block">
	<legend class="complex">Boxes</legend>
	<span>Image Settings:</span> <br>
	<span>Style:</span>
	<select id="text_bg">
	<option value="undertale">Undertale</option>
	<option value="outertale">Outertale</option>
	<option value="deltarune">Deltarune</option>
	<option value="underswap">TS!Underswap</option>
	<option value="jumbo">Jumbo</option>
	<option value="cavestory">Cave Story</option>
	<option value="custom">Custom</option>
	</select>
	<input type="file" id="text_bg_alt" accept=".txt" style="display:none"/>
	<br>
	<span>Image Width: </span><input type="number" id="origin_w" value="578" style="width: 40px;" min="0"/>
	<span>Image Height: </span><input type="number" id="origin_h" value="152" style="width: 40px;" min="0"/>
	<br>
	<span>Margin:</span><input type="checkbox" id="margesimpson">
	<br class="complex"><br class="complex">
	<button class="complex" onclick="new_box()">Add New Box</button>
	<br class="complex"><br>
	</div>
	<div id="chr_over_box" style="display:inline-block">
	<div class="box" id="char_box">
	<legend class="complex">Portraits</legend>
	<!--span>Import Character:</span> <input type="file" id="text_exp_alt" accept=".txt"/>
	<br-->
	<button class="complex" onclick="new_port()">Add New Portrait</button>
	</div>
	<br>
	<div class="box" id="over_box" style="display:inline-block">
	<legend class="complex">Overlays</legend>
	<button class="complex" onclick="new_over()">Add New Overlay</button>
	<!--
	<span>Overlay: </span>
	<select id="text_over">
	<option value="transparent">None</option>
	<option value="custom">Custom</option>
	<option value="fog">Fog</option>
	<option value="evil_glow">Red Glow</option>
	<option value="snowdin">Snow</option>
	<option value="scanlines">Scanlines</option>
	</select>
	<input type="file" id="text_over_alt" accept="image/png" style="display:none"/>-->
	</div>
	</div>
	<br>
	<br class="complex">
	<div class="box" id="text_box" style="width:700px" style="display:inline-block">
	<legend class="complex">Text</legend>
	<span>Font:</span>
	<select id="text_font">
	<option value="determination_mono">Default</option>
	<option value="custom">Custom</option>
	<option value="papyrus">Papyrus</option>
	<option value="comic_sans">Comic Sans</option>
	<option value="silly">Silly Scribbles</option>
	<option value="omori_font">Omori (Normal)</option>
	<option value="omori_font2">Omori (Alt)</option>
	<option value="determination_upscale">Forever</option>
	<option value="arial">Arial</option>
	<option value="courier_new">Cave Story</option>
	</select>
	<input type="file" id="text_font_alt" accept="image/png" style="display:none"/>
	<br>
	<span id="custom_show" style="display:none">
	<span>Mono:</span><input type="checkbox" id="noJoke" checked="true"><span>or </span><input type="file" id="text_font_spacin" accept=".txt"/>
	</span>
	<br class="complex">
	<button class="complex" onclick="new_text()">More Text</button>
	<br class="complex">
	<br class="complex">
	</div>
	<br>
	<canvas id="textbox_work" style="display:block" width="578" height="152"></canvas>
	<img id="canvasTrue" src="assets/textboxes/undertale.png"></img>
	<canvas id="portrait_outline" style="display:none" width="134" height="140"></canvas>
	<br>
	<button onclick="draw_canvas()">Generate Box</button>
	<button class="complex" onclick="save_box()">Save Custom Box</button>
	<br>
	<hr>
	<button onclick="box_stack_add()">Add to Stack</button>
	<button onclick="box_stack_update()">Refresh Stack</button>
	<button onclick="stack_reset()">Clear Stack</button> 
	<span>Stack Width:</span><input type="number" id="stack_width" value="1" style="width: 25px;" min="1" max="9"/>
	<br>
	<canvas id="stack_work" style="display:none" width="590" height="0"></canvas>
	<img id="canvasStack" style="display:none"></img>
	<hr>
    </main>
    <script src="texter.js"></script>
  </body>
</html>
